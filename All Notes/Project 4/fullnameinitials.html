<!DOCTYPE HTML>
<HTML lang="en">
    <style>

        body
        {

            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;

        }
        canvas
        {

            border: 1px solid #ccc;
            display: block;
            background-color: white;

        }

    </style>
    <Head>
        <Title> Project 4 </Title>
        <script id="2dVertexShader" type="notjs">

            // Canvas body layout taken from Project 3
            attribute vec4 a_position;
            attribute vec3 a_color;
            varying vec3 v_color;
            void main()
            {

                v_color = a_color;
                gl_Position = a_position;

            }

        </script>
        <script id="2dFragmentShader" type="notjs">

            precision mediump float;
            varying vec3 v_color;
            void main()
            {

                gl_FragColor = vec4(v_color, 1);

            }

        </script>
        <script>

            class InitWebGLProgram
            {

                constructor()
                {

                    gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
                    gl.clearColor(1, 1, 1, 1);
                    gl.clear(gl.COLOR_BUFFER_BIT);

                }
                createShader(type, source)
                {

                    var shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    var success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
                    if(success)
                    {

                        return shader;

                    }

                    console.error(gl.getShaderInfoLog(shader));
                    gl.deleteShader(shader);

                }
                createProgram(vs, fs)
                {

                    var program = gl.createProgram();
                    gl.attachShader(program, vs);
                    gl.attachShader(program, fs);
                    gl.linkProgram(program);
                    var success = gl.getProgramParameter(program, gl.LINK_STATUS);
                    if(success)
                    {

                        return program;

                    }
                    console.error(gl.getProgramInfoLog(program));
                    gl.deleteProgram(program);

                }

            }

            class Shape
            {

                // Part A And B
                constructor()
                {

                    // Coordinates found by Gemini
                    this.verticesH = new Float32Array([
                        -0.8, 0.5,      0, 0, 1,    -0.7, 0.5,      0, 0, 1,    -0.7, -0.5,     0, 0, 1,    -0.8, -0.5,     0, 0, 1,
                        -0.5, 0.5,      0, 0, 1,    -0.4, 0.5,      0, 0, 1,    -0.4, -0.5,     0, 0, 1,    -0.5, -0.5,     0, 0, 1,
                        -0.7, 0.05,     0, 0, 1,    -0.5, 0.05,     0, 0, 1,    -0.5, -0.05,    0, 0, 1,    -0.7, -0.05,    0, 0, 1
                    ]);

                    this.verticesN = new Float32Array([
                        -0.15, 0.5,      0.5, 0, 0.5,    -0.05, 0.5,    0.5, 0, 0.5,   -0.05, -0.5,     0.5, 0, 0.5,    -0.15, -0.5,     0.5, 0, 0.5,
                         0.05, 0.5,      0.5, 0, 0.5,     0.15, 0.5,    0.5, 0, 0.5,    0.15, -0.5,     0.5, 0, 0.5,     0.05, -0.5,     0.5, 0, 0.5,
                        -0.05, 0.5,      0.5, 0, 0.5,     0.05, -0.5,   0.5, 0, 0.5,    0.15, -0.5,     0.5, 0, 0.5,    -0.05,  0.5,     0.5, 0, 0.5
                    ]);

                    this.verticesP = new Float32Array([
                         0.4,  0.5,      1, 0, 0,     0.5, 0.5,      1, 0, 0,     0.5, -0.5,     1, 0, 0,     0.4, -0.5,    1, 0, 0,
                         0.5,  0.5,      1, 0, 0,     0.7, 0.5,      1, 0, 0,     0.7,  0.4,     1, 0, 0,     0.5,  0.4,    1, 0, 0,
                         0.5,  0.1,      1, 0, 0,     0.7, 0.1,      1, 0, 0,     0.7,  0.0,     1, 0, 0,     0.5,  0.0,    1, 0, 0,
                         0.65, 0.5,      1, 0, 0,    0.75, 0.5,      1, 0, 0,     0.75, 0.0,     1, 0, 0,     0.65, 0.0,    1, 0, 0
                    ]);

                    this.buffer = gl.createBuffer();

                }
                render(program)
                {

                    var positiveAttrib = gl.getAttribLocation(program, "a_position");
                    var colorAttrib = gl.getAttribLocation(program, "a_color");
                    gl.enableVertexAttribArray(positiveAttrib);
                    gl.enableVertexAttribArray(colorAttrib);

                    gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);

                    // GPU letter data and colors solved through Arrow Function from Gemini
                    const draw = (data) => {

                        gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
                        var stride = 5 * 4;
                        // Part C And D
                        gl.vertexAttribPointer(positiveAttrib, 2, gl.FLOAT, false, stride, 0);
                        gl.vertexAttribPointer(colorAttrib, 3, gl.FLOAT, false, stride, 2 * 4);

                        for(let i = 0; i < data.length / 5; i += 4)
                        {

                            gl.drawArrays(gl.TRIANGLE_FAN, i, 4);

                        }

                    };

                    draw(this.verticesH);
                    draw(this.verticesN);
                    draw(this.verticesP);

                }

            }

            class main
            {

                constructor()
                {

                    this.webGL = new InitWebGLProgram();
                    var vsSource = document.getElementById("2dVertexShader").text;
                    var fsSource = document.getElementById("2dFragmentShader").text;
                    var vs = this.webGL.createShader(gl.VERTEX_SHADER, vsSource);
                    var fs = this.webGL.createShader(gl.FRAGMENT_SHADER, fsSource);
                    this.program = this.webGL.createProgram(vs, fs);
                    gl.useProgram(this.program);
                    var initials = new Shape();
                    initials.render(this.program);

                }

            }

        </script>
    </Head>
    <Body>
        <canvas id="myCanvas" width="640" height="400">
                Your browser does not support canvas.
        </canvas>
        <script>
            var canvas = document.getElementById("myCanvas");
            var gl = canvas.getContext("webgl");
            var m = new main();
        </script>
    </Body>
</HTML>
