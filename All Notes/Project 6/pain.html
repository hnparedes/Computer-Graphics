<!DOCTYPE html>
<HTML lang="en">
    <head>
        <title> Project 6 </title>
        <style>
            body {
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background-color: #f0f0f0;
                font-family: sans-serif;
            }
            canvas {
                border: 1px solid #333;
                background-color: white;
                cursor: crosshair;
            }
            .controls {
                margin-bottom: 10px;
                padding: 15px;
                background: #fff;
                border-radius: 8px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
                display: flex;
                gap: 15px;
                align-items: center;
            }
        </style>

        <script id="2dVertexShader" type="notjs">
            // Phase 1a, 1b, 1c: Cascading Style Sheets for the control interface and canvas centering
            attribute vec4 a_position;
            attribute vec3 a_color;
            varying vec3 v_color;
            void main()
            {

                v_color = a_color;
                gl_Position = a_position;
                // Point size to make vertices visible during drawing taken by Gemini
                gl_PointSize = 7.0;

            }
        </script>

        <script id="2dFragmentShader" type="notjs">
            precision mediump float;
            varying vec3 v_color;
            void main()
            {

                gl_FragColor = vec4(v_color, 1);

            }
        </script>

        <script>

            class InitWebGLProgram
            {

                constructor()
                {

                    gl.viewport(0, 0, canvas.width, canvas.height);
                    gl.clearColor(1, 1, 1, 1);

                }

                createShader(type, source)
                {

                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    return shader;

                }

                createProgram(vs, fs)
                {

                    const program = gl.createProgram();
                    gl.attachShader(program, vs);
                    gl.attachShader(program, fs);
                    gl.linkProgram(program);
                    return program;

                }

            }

            class Shape
            {

                constructor(type, color, style)
                {

                    // Phase 1a, 1b, 1c: Store current color and fill/outline style
                    this.type = type;
                    this.color = color;
                    this.style = style;
                    this.vertices = [];
                    this.points = [];
                    this.buffer = gl.createBuffer();
                }

                addVertex(x, y)
                {

                    // Phase 1e-1j: Method to add vertices into an array with position and color data
                    this.vertices.push(x, y, this.color.r, this.color.g, this.color.b);

                }

                render(program, isPreview = false)
                {
                    if(this.vertices.length == 0)
                    {

                        return;

                    }

                    // Phase 2d: Re-buffer vertex data for the shape at every render call
                    gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
                    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(this.vertices), gl.DYNAMIC_DRAW);
                    const positionLoc = gl.getAttribLocation(program, "a_position");
                    const colorLoc = gl.getAttribLocation(program, "a_color");
                    gl.enableVertexAttribArray(positionLoc);
                    gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 5 * 4, 0);
                    gl.enableVertexAttribArray(colorLoc);
                    gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, 5 * 4, 2 * 4);
                    
                    let mode;
                    // Phase 1k: Condition to determine primitive mode based on shape type and style
                    if(this.type == "line")
                    {

                        mode = gl.LINE_STRIP;

                    }
                    // Phase 2f: Use LINE_LOOP during drawing for cursor effect
                    else if(isPreview || this.style == "outline")
                    {

                        mode = gl.LINE_LOOP;

                    }
                    else
                    {
                     
                        mode = (this.type == "triangle") ? gl.TRIANGLES : gl.TRIANGLE_FAN;
                     
                    }

                    gl.drawArrays(mode, 0, this.vertices.length / 5);

                }

            }

            class main
            {

                constructor()
                {

                    this.webGL = new InitWebGLProgram();
                    const vsSource = document.getElementById("2dVertexShader").text;
                    const fsSource = document.getElementById("2dFragmentShader").text;
                    const vs = this.webGL.createShader(gl.VERTEX_SHADER, vsSource);
                    const fs = this.webGL.createShader(gl.FRAGMENT_SHADER, fsSource);
                    this.program = this.webGL.createProgram(vs, fs);
                    gl.useProgram(this.program);

                    // Phase 1d: List data to store completed shapes
                    this.shapes = [];
                    this.currentShape = null;
                    this.render();

                }

                // Coordinate transformation from screen space to WebGL clip space taken by Gemini
                getMousePos(event)
                {

                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: ((event.clientX - rect.left) / canvas.width) * 2 - 1,
                        y: ((event.clientY - rect.top) / canvas.height) * -2 + 1
                    };

                }

                handleMouseDown(event)
                {
                    // Phase 1h, 1j: Detect right-click to finalize lines or n-polygons
                    if (event.button == 2) 
                    {
                        if (this.currentShape && this.currentShape.type == "n-polygon") 
                        {
                            if(this.currentShape.points.length >= 3)
                            {
                                this.shapes.push(this.currentShape);
                            }                           
                            this.currentShape = null;
                        }
                        return;
                    }

                    const position1 = this.getMousePos(event);
                    const type = document.getElementById("shapeSelect").value;
                    const style = document.getElementById("styleSelect").value;
                    const color = this.hexToRgb(document.getElementById("colorPicker").value);

                    // Phase 1e: Create a new shape with current settings on first click
                    if (!this.currentShape) 
                    {
                        this.currentShape = new Shape(type, color, style);
                        this.currentShape.points.push(position1);
                        this.updateShape(position1);
                    } 
                    else 
                    {
                        // Phase 1f, 1g, 1h: Finalize 2 click shapes solved by Gemini
                        if (type == "square" || type == "circle" || type == "line") 
                        {
                            this.updateShape(position1);
                            this.shapes.push(this.currentShape);
                            this.currentShape = null;
                        }
                        // Phase 1i: Finalize triangle after 3 clicks solved by ChatGPT
                        else if (type == "triangle") 
                        {
 
                            this.currentShape.points.push(position1);
                            this.updateShape(position1);
                            if(this.currentShape.points.length == 3)
                            {

                                this.shapes.push(this.currentShape);
                                this.currentShape = null;

                            }
                            
                        }
                        // Phase 1j: Continue adding points for n-polygon until right-click solved by ChatGPT
                        else if(type == "n-polygon")
                        {

                            this.currentShape.points.push(position1);
                            this.updateShape(position1);

                        }
                    }
                }

                // Phase 2a, 2b: Global mouse move callback to trigger the drawing logic
                onMouseMove(event) 
                {
                    if (!this.currentShape)
                    {
                        return;
                    }
                    const position2 = this.getMousePos(event);
                    // Phase 2c: current mouse position passed to update the vertex list data temporarily
                    this.updateShape(position2);
                }

                updateShape(mousePosition, isTemp = false)
                {

                    // Phase 2g: Clearing vertices list data to pop the previous temporary shape
                    this.currentShape.vertices = [];
                    const start = this.currentShape.points[0];
                    const type = this.currentShape.type;

                    // PHase 1f: Calculate the 4 corners of the square from 2 clicked points solved by Gemini
                    if(type == "square") 
                    {
                        this.currentShape.addVertex(start.x, start.y);
                        this.currentShape.addVertex(mousePosition.x, start.y);
                        this.currentShape.addVertex(mousePosition.x, mousePosition.y);
                        this.currentShape.addVertex(start.x, mousePosition.y);
                    } 
                    // Phase 1g: Generate 64 points for a circle using trigonometry and radius solved by Gemini
                    else if(type == "circle") 
                    {
                        const r = Math.sqrt(
                            Math.pow(mousePosition.x - start.x, 2) + 
                            Math.pow(mousePosition.y - start.y, 2)
                        );

                        if(this.currentShape.style == "fill")
                        {

                            this.currentShape.addVertex(start.x, start.y);

                        }
                        for(let i = 0; i <= 64; i++)
                        {
                            const angle = (i / 64) * Math.PI * 2;
                            this.currentShape.addVertex(
                                start.x + Math.cos(angle) * r, 
                                start.y + Math.sin(angle) * r
                            );
                        }
                    }
                    else
                    {

                        for(let p of this.currentShape.points)
                        {

                            this.currentShape.addVertex(p.x, p.y);

                        }
                        // Phase 2c: Adding the mouse position as a temporary vertex for the cursor effect
                        if(type != "line" || (type == "line" && this.currentShape.points.length < 2))
                        {

                            this.currentShape.addVertex(mousePosition.x, mousePosition.y);

                        }

                    }
                    
                }

                // Method to convert hex color string into RGB floats for WebGL taken by Gemini
                hexToRgb(hex) 
                {
                    return {
                        r: parseInt(hex.slice(1,3), 16)/255,
                        g: parseInt(hex.slice(3,5), 16)/255,
                        b: parseInt(hex.slice(5,7), 16)/255
                    };
                }

                // Phase 2e: Render loop to clear screen and draw all shapes
                render()
                {

                    gl.clear(gl.COLOR_BUFFER_BIT);
                    for(let s of this.shapes)
                    {

                        s.render(this.program);

                    }
                    // Phase 2f: Render the current shape as a preview
                    if(this.currentShape)
                    {

                        this.currentShape.render(this.program, true);

                    }

                    requestAnimationFrame(() => this.render());

                }

            }

        </script>
    </head>
    <body oncontextmenu="return false;">
        <div class="controls">
            <select id="shapeSelect">
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
                <option value="line">Line</option>
                <option value="circle">Circle</option>
                <option value="n-polygon">N-Polygon</option>
            </select>
            <select id="styleSelect">
                <option value="fill">Fill</option>
                <option value="outline">Outline</option>
            </select>
            <input type="color" id="colorPicker" value="#ff0000">
            <span>Right-Click to finish N-Polygon</span>
        </div>

        <canvas id="myCanvas" width="1100" height="550"></canvas>

        <script>
            const canvas = document.getElementById("myCanvas");
            const gl = canvas.getContext("webgl");
            var m = new main();
            canvas.addEventListener("mousedown", (e) => m.handleMouseDown(e));
            canvas.addEventListener("mousemove", (e) => m.onMouseMove(e));
        </script>
    </body>
</HTML>
