<!DOCTYPE HTML>
<HTML lang="en">
	<style>
		body {
			margin: 0;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background-color: #f0f0f0;
		}
		canvas {
			border: 1px solid #ccc;
			display: block;
		}
	</style>
	<Head>
	<Title>"Welcome TO WEB_GL Shaders"</TITLE>
		
		<!-- 
		GLSL is the language used for shaders (GL Shader Language)
		Attribute - you specify how to pull the data out of the buffers you supply.
		Buffers - Data loaded onto the GPU (Normally vertex information)
		Uniforms - global variables (in GLSL) that you set before you run the shader program
		Textures - Textures are arrays of data you can randomly acces in your shader program.  
		Varying - are way for a vertex shader to pass data to the fragmentShader.
		-->
		<script id="2dVertexShader" type="notjs">
		attribute vec4 a_position;
		attribute vec3 a_color;
		varying vec3 v_color;

		uniform mat4 u_matrix; // This allows rotation and perspective

		void main() 
		{

    		// Multiply the position by the transformation matrix
    		gl_Position = u_matrix * a_position;
    		v_color = a_color;

		}		
		</SCRIPT>
		
		<script id="2dFragmentShader" type="notjs">
		// Fragment shaders do not have precision so it has to be set.
		precision mediump float;
		varying vec3 v_color;
		void main()
		{

			gl_FragColor = vec4(v_color, 1);
		 
		}
		</script>
		
		<script>
		class InitWebGLProgram
		{
			constructor()
			{
				
				//setup our viewport
				gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
				//set clear colors
				gl.clearColor(1,1,1,1);
				gl.clear(gl.COLOR_BUFFER_BIT);
			
			}
			createShader(type, source)
			{

				var shader = gl.createShader(type);
				gl.shaderSource(shader, source);
				gl.compileShader(shader);
				var success = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
				if(success)
				{

					return shader;

				}
				//Else it didn't work
				console.error(gl.getShaderInfoLog(shader));
				gl.deleteShader(shader);
				
			}
			
			createProgram(vs,fs)
			{
				
				var program = gl.createProgram();
				gl.attachShader(program, vs);
				gl.attachShader(program, fs);
				gl.linkProgram(program);
				var success = gl.getProgramParameter(program, gl.LINK_STATUS);
				if(success)
				{

					return program;

				}

				console.error(gl.getProgramInfoLog(program));
				gl.deleteProgram(program);

			}
		}
	
		class Shape 
		{
    		constructor() 
			{
        		var positions = 
				[
            		// X,    Y,    Z,      R, G, B
            		0.0,  0.5,  0.0,     1, 0, 0,  // Top Point
           			-0.5, -0.5,  0.5,     0, 1, 0,  // Front Left
           	 		0.5, -0.5,  0.5,     0, 0, 1,  // Front Right
            		0.0, -0.5, -0.5,     1, 1, 0   // Back Point
        		];

        		this.positionBuffer = gl.createBuffer();
        		gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
        		gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.STATIC_DRAW);
        
        		// Use Index Buffer to connect the dots into triangles
        		var indices = 
				[
            		0, 1, 2, // Front Face
            		0, 2, 3, // Right Face
            		0, 3, 1, // Left Face
            		1, 3, 2  // Bottom Face
        		];

        		this.indexBuffer = gl.createBuffer();
        		gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.indexBuffer);
        		gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);
    		}

    		render(program, angle) 
			{
        		var posLoc = gl.getAttribLocation(program, "a_position");
        		var colLoc = gl.getAttribLocation(program, "a_color");
        		var matLoc = gl.getUniformLocation(program, "u_matrix");

        		gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
        		gl.enableVertexAttribArray(posLoc);
        		gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 6 * 4, 0);

        		gl.enableVertexAttribArray(colLoc);
        		gl.vertexAttribPointer(colLoc, 3, gl.FLOAT, false, 6 * 4, 3 * 4);

        		// Simple Rotation Matrix (Y-axis)
        		let c = Math.cos(angle);
        		let s = Math.sin(angle);
        		let matrix = 
				[
            		c, 0, s, 0,
            		0, 1, 0, 0,
           			-s, 0, c, 0,
            		0, 0, 0, 1
        		];
        		gl.uniformMatrix4fv(matLoc, false, matrix);

        		gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, this.indexBuffer);
        		gl.drawElements(gl.TRIANGLES, 12, gl.UNSIGNED_SHORT, 0);
    		}
		}
		
		
		class main 
		{
    		constructor() 
			{
        		this.webGL = new InitWebGLProgram();
        		gl.enable(gl.DEPTH_TEST); // Vital for 3D!

        		var vsSource = document.getElementById("2dVertexShader").text;
        		var fsSource = document.getElementById("2dFragmentShader").text;
        		var vs = this.webGL.createShader(gl.VERTEX_SHADER, vsSource);
        		var fs = this.webGL.createShader(gl.FRAGMENT_SHADER, fsSource);
        		this.program = this.webGL.createProgram(vs, fs);
        
        		gl.useProgram(this.program);
        		this.shape = new Shape();
        		this.angle = 0;

        		const loop = () => {
            		gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            		this.angle += 0.02;
            		this.shape.render(this.program, this.angle);
            		requestAnimationFrame(loop);
        		};
				
        		loop();
    		}
		}
		</script>
	</Head>
	<BODY>
		<HEADER>
		
		</HEADER>

		<FOOTER>
		
		</FOOTER>
		<SCRIPT>
			var canvas = document.getElementById("myCanvas");
			var gl = canvas.getContext("webgl");
			
			var m = new main();
		</SCRIPT>		
	</BODY>
</HTML>
