<!DOCTYPE HTML>
<HTML lang="en">
<head>
    <title>"Interactive WebGL Triangles"</title>
    <style>
        body 
        {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        canvas 
        {
            border: 1px solid #ccc;
            display: block;
            cursor: crosshair;
        }
    </style>

    <script id="2dVertexShader" type="notjs">
        attribute vec4 a_position;
        attribute vec3 a_color;
        varying vec3 v_color;

        void main() 
        {
            v_color = a_color;
            gl_Position = a_position;
            // Point size remains for internal state, but won't be drawn if gl.POINTS is removed
            gl_PointSize = 7.0; 
        }		
    </script>

    <script id="2dFragmentShader" type="notjs">
        precision mediump float;
        varying vec3 v_color;
        void main() 
        {
            gl_FragColor = vec4(v_color, 1);
        }
    </script>

    <script>
        class InitWebGLProgram {
            constructor() 
            {
                gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
                gl.clearColor(0, 1, 0, 1); // Green background logic remains
                gl.clear(gl.COLOR_BUFFER_BIT);
            }

            createShader(type, source) 
            {
                var shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                var success1 = gl.getShaderParameter(shader, gl.COMPILE_STATUS);
                if (success1) 
                {
                    return shader;
                }
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
            }

            createProgram(vs, fs) 
            {
                var program = gl.createProgram();
                gl.attachShader(program, vs);
                gl.attachShader(program, fs);
                gl.linkProgram(program);
                var success2 = gl.getProgramParameter(program, gl.LINK_STATUS);
                if (success2) return program;
                console.error(gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
            }
        }

        class Triangle {
            constructor() 
            {
                this.VertCount = 0;
                this.IsFinished = false;
                this.Positions = []; 
                this.positionBuffer = gl.createBuffer();
            }

            addPoint(x, y) 
            {
                this.Positions.push(x, y, 1, 0, 0); // Red triangle logic remains
                this.VertCount += 1;
                if (this.VertCount == 3) 
                {
                    this.IsFinished = true;
                }
                this.updateBuffer(this.Positions);
            }

            addPointTemp(x, y)
            {
                if(this.IsFinished) 
                {
                    return;
                }
                this.tempPositions = [...this.Positions, x, y, 1, 0, 0];
                this.updateBuffer(this.tempPositions);
            }

            updateBuffer(data)
            {
                gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.STATIC_DRAW);
            }

            render(program) 
            {
                // LOGIC FROM VERSION A: Don't render if no points have been clicked yet
                if(this.VertCount === 0 && !this.IsFinished) 
                {
                    return;
                }
                gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
                var positionLoc = gl.getAttribLocation(program, "a_position");
                var colorLoc = gl.getAttribLocation(program, "a_color");

                gl.enableVertexAttribArray(positionLoc);
                gl.enableVertexAttribArray(colorLoc);

                gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 20, 0);
                gl.vertexAttribPointer(colorLoc, 3, gl.FLOAT, false, 20, 8);

                if(this.IsFinished)
                {
                    gl.drawArrays(gl.TRIANGLES, 0, 3);
                }
                else
                {
                    // Draw lines as a loop (2 lines) when 2 points exist + mouse preview
                    let mode = (this.VertCount == 2) ? gl.LINE_LOOP : gl.LINE_STRIP;
                    gl.drawArrays(mode, 0, this.VertCount + 1);
                }
            }
        }

        class main {
            constructor() 
            {
                this.webGL = new InitWebGLProgram();
                var vsSource = document.getElementById("2dVertexShader").text;
                var fsSource = document.getElementById("2dFragmentShader").text;
                var vs = this.webGL.createShader(gl.VERTEX_SHADER, vsSource);
                var fs = this.webGL.createShader(gl.FRAGMENT_SHADER, fsSource);
                this.program = this.webGL.createProgram(vs, fs);
                gl.useProgram(this.program);

                this.triangles = [];
                this.currentTriangle = new Triangle();

                canvas.addEventListener("mousedown", (e) => this.handleClick(e));
                canvas.addEventListener("mousemove", (e) => this.handleMove(e));
                this.render();
            }

            getMousePosition(event)
            {
                const rect = canvas.getBoundingClientRect();
                return {
                    x: ((event.clientX - rect.left) / canvas.width) * 2 - 1,
                    y: ((event.clientY - rect.top) / canvas.height) * -2 + 1
                };
            }

            handleClick(event) 
            {
                const pos = this.getMousePosition(event);
                this.currentTriangle.addPoint(pos.x, pos.y);
                if (this.currentTriangle.IsFinished) 
                {
                    this.triangles.push(this.currentTriangle);
                    this.currentTriangle = new Triangle();
                }
                else
                {
                    this.currentTriangle.addPointTemp(pos.x, pos.y);
                }
            }

            handleMove(event)
            {
                const pos = this.getMousePosition(event);
                this.currentTriangle.addPointTemp(pos.x, pos.y);
            }

            render() 
            {
                gl.clear(gl.COLOR_BUFFER_BIT);
                for (let t of this.triangles) 
                {
                    t.render(this.program);
                }
                this.currentTriangle.render(this.program);
                requestAnimationFrame(() => this.render());
            }
        }
    </script>
</head>
<body>
    <canvas id="myCanvas" width="640" height="400">
        Your browser does not support canvas.
    </canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var gl = canvas.getContext("webgl");
        var m = new main();
    </script>
</body>
</html>
